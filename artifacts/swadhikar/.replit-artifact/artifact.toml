kind = "web"
previewPath = "/"
title = "Swadhikar (स्वाधिकार)"
version = "1.0.0"
id = "artifacts/swadhikar"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25315
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/swadhikar run dev"

[services.env]
PORT = "25315"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/swadhikar", "run", "build"]
publicDir = "artifacts/swadhikar/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
